<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient: deep red to vibrant red -->
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="65%" fx="35%" fy="30%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="45%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#9b1d20"/>
    </radialGradient>

    <!-- Subtle inner glow -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#9b1d20" flood-opacity="0.35"/>
    </filter>

    <!-- Inner shadow for depth -->
    <filter id="innerDepth">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- Outer circle with gradient -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle rim highlight -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Inner glow overlay -->
  <circle cx="200" cy="200" r="190" fill="url(#innerGlow)"/>

  <!-- Letter G -->
  <text x="200" y="215" text-anchor="middle" dominant-baseline="central"
        font-family="'Geist', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="220" font-weight="700" fill="white"
        letter-spacing="-0.04em">
    G
  </text>
</svg>
